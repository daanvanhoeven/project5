<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Vrijwilliger.nl{% endblock %}</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navigatie -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}"> Vrijwilliger.nl </a>

        <!-- Hamburger knop -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'home' %}"> Home </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'lijst_diensten' %}">
                Diensten
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'create_hulpaanvraag' %}">
                Hulpaanvraag
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'contactformulier' %}">
                Contact
              </a>
            </li>

            {% if user.is_superuser %}
            <li class="nav-item">
              <a class="nav-link" href="/admin/"> Admin </a>
            </li>
            {% endif %}
          </ul>

          <!-- Rechterkant -->
          <ul class="navbar-nav">
            {% if user.is_authenticated %}

            <li class="nav-item">
              <a class="nav-link" href="{% url 'profiel' %}"> Profiel </a>
            </li>

           <li class="nav-item">
  <form method="post" action="{% url 'logout' %}" class="d-inline">
    {% csrf_token %}
    <button type="submit" class="nav-link btn btn-link">
      Uitloggen
    </button>
  </form>
</li>

            {% else %}

            <li class="nav-item">
              <a class="nav-link" href="{% url 'login' %}"> Inloggen </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="{% url 'register' %}"> Registreren </a>
            </li>

            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <!-- Content -->
    <div class="container mt-4">{% block content %} {% endblock %}</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
