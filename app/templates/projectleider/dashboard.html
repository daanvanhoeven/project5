{% extends "base.html" %}

{% block content %}
<h1>Projectleider Dashboard</h1>

<h3>Diensten</h3>

<table class="table">
  <tr>
    <th>Titel</th>
    <th>Datum</th>
    <th>Plekken over</th>
  </tr>

  {% for dienst in diensten %}
  <tr>
    <td>{{ dienst.titel }}</td>
    <td>{{ dienst.datum }}</td>
    <td>{{ dienst.spots_left }}</td>
  </tr>
  {% endfor %}
</table>

{% endblock %}
